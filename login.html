<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Otaku-Flow</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="login-page">
    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="logo" style="margin-bottom: 2rem; justify-content: center;">
                <span class="logo-text">OTAKU-FLOW</span>
            </a>
            <h2>Login</h2>
            <p>Access your personal anime dashboard</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="#">Create One</a></p>
                <p><a href="index.html">Back to Home</a></p>
            </div>
        </div>
    </div>
    <script>

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('otakuFlow_isLoggedIn', 'true');
            alert("Success! Welcome back to Otaku-Flow.");
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
