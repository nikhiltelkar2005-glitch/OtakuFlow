<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Flow | Otaku-Flow Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="logo" style="margin-bottom: 2rem; justify-content: center;">
                <span style="color: var(--brand-orange);">●</span> OTAKU-FLOW
            </a>
            
            <div class="login-header">
                <h1 id="login-title">Welcome Back</h1>
                <p id="login-subtitle">Join the flow and start your legendary journey.</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn-primary">Unlock the Flow</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-logins">
                <button class="social-btn" title="Login with Discord">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.23 10.23 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.956 2.419-2.157 2.419zm7.974 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/></svg>
                </button>
                <button class="social-btn" title="Login with Google">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.908 3.152-1.928 4.176-1.288 1.288-3.312 2.688-7.392 2.688-6.192 0-10.704-4.824-10.704-10.968s4.512-10.968 10.704-10.968c3.272 0 5.704 1.208 7.536 2.92l2.336-2.336C18.592 1.632 15.824 0 12 0 5.4 0 0 5.4 0 12s5.4 12 12 12c3.576 0 6.264-1.128 8.376-3.288 2.328-2.328 2.992-5.4 2.992-7.848 0-.744-.064-1.416-.184-2h-10.704z"/></svg>
                </button>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="#" id="toggle-auth">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        const loginTitle = document.getElementById('login-title');
        const loginSubtitle = document.getElementById('login-subtitle');
        const authBtn = document.querySelector('.auth-btn-primary');
        const toggleAuth = document.getElementById('toggle-auth');
        let isSignup = false;

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isSignup = !isSignup;
            
            if (isSignup) {
                loginTitle.textContent = "Join the Flow";
                loginSubtitle.textContent = "Create an account to track your legendary journey.";
                authBtn.textContent = "Start Legend";
                toggleAuth.textContent = "Login Instead";
            } else {
                loginTitle.textContent = "Welcome Back";
                loginSubtitle.textContent = "Join the flow and start your legendary journey.";
                authBtn.textContent = "Unlock the Flow";
                toggleAuth.textContent = "Create Account";
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Store login state
            localStorage.setItem('otakuFlow_isLoggedIn', 'true');
            // Mock success: redirect back to home
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
