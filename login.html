<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Otaku-Flow</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body class="login-page">
    <!-- Cinematic Background -->
    <div class="anime-bg-layer">
        <div class="bokeh-layer"></div>
        <div class="particle-field"></div>
        <div class="god-rays"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <a href="index.html" class="logo" style="margin-bottom: 2rem; justify-content: center;">
                <div class="logo-icon">
                    <img src="logo/4cbf992843f12bc40618bfadd3aa9a9a.jpg" alt="Zoro Jolly Roger">
                </div>
                <span class="logo-text" style="font-size: 1.5rem;">OTAKU<span class="flow-accent">FLOW</span></span>
            </a>
            <div class="auth-header">
                <h2>Enter the Dojo</h2>
                <p>Your spirit is recognized... draw your blade to proceed.</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Spirit Identity (Email)</label>
                    <input type="email" id="email" placeholder="Enter your spirit signature" required>
                </div>
                <div class="form-group">
                    <label for="password">Secret Technique (Password)</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">
                    <span>Draw Your Blade</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </button>
            </form>
            <div class="auth-footer">
                <p>New explorer? <a href="#">Awaken Account</a></p>
                <a href="index.html" class="back-home-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    <span>Return to Journey</span>
                </a>
            </div>
        </div>
    </div>
    <script>

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('otakuFlow_isLoggedIn', 'true');
            alert("Success! Welcome back to Otaku-Flow.");
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
